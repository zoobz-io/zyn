name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Run tests
      run: make test

    - name: Run linter
      run: |
        go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.7.2
        make lint

    - name: Verify go.mod is tidy
      run: |
        go mod tidy
        git diff --exit-code go.mod go.sum

  release:
    name: Release
    needs: validate
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@v6
      with:
        distribution: goreleaser
        version: latest
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GORELEASER_CURRENT_TAG: ${{ github.ref_name }}

  tag-submodules:
    name: Tag Submodules
    needs: release
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Tag submodules
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        for mod in anthropic gemini openai testing; do
          if git ls-remote --exit-code --tags origin "refs/tags/${mod}/${VERSION}" >/dev/null 2>&1; then
            echo "Tag ${mod}/${VERSION} already exists, skipping"
          else
            git tag "${mod}/${VERSION}"
            git push origin "${mod}/${VERSION}"
            echo "Created tag ${mod}/${VERSION}"
          fi
        done

  verify:
    name: Verify
    needs: [release, tag-submodules]
    runs-on: ubuntu-latest
    steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Verify module
      run: |
        sleep 60
        TAG=${GITHUB_REF#refs/tags/}
        go install github.com/zoobz-io/zyn@$TAG || echo "Module verification pending proxy sync"
      continue-on-error: true
